<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Store - Abu Amir</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-face-aframe.prod.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* قسم المنتجات في الأعلى */
        #store-front { height: 45%; background: white; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { border: 1px solid #ddd; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; }
        .product-card:active { transform: scale(0.95); background: #eef2ff; }
        .product-card img { width: 50px; height: 50px; object-fit: contain; }
        
        /* قسم الكاميرا في الأسفل (مربع) */
        #ar-container { height: 55%; width: 100%; position: relative; background: #000; display: flex; justify-content: center; align-items: center; }
        .camera-frame { width: 100%; height: 100%; max-width: 500px; aspect-ratio: 1/1; position: relative; overflow: hidden; border-top: 4px solid #2563eb; }
        
        #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); color:white; display:flex; justify-content:center; align-items:center; z-index:100; }
    </style>
</head>
<body>

    <div id="store-front">
        <div class="header">
            <h2 style="margin:0; color:#1e293b;">متجر AR الذكي</h2>
            <span style="color:#2563eb; font-weight:bold;">أبو أمير</span>
        </div>
        <div class="product-grid">
            <div class="product-card" onclick="switchProduct('glasses')">
                <div style="font-size:24px;">🕶️</div>
                <p>نظارة فاخرة</p>
            </div>
            <div class="product-card" onclick="switchProduct('hat')">
                <div style="font-size:24px;">🧢</div>
                <p>قبعة كاجوال</p>
            </div>
            <div class="product-card" onclick="switchProduct('clear')">
                <div style="font-size:24px;">❌</div>
                <p>إزالة الفلتر</p>
            </div>
        </div>
        <p style="font-size:12px; color:#666; margin-top:15px;">* اختر منتجاً ليظهر فوراً في الكاميرا بالأسفل</p>
    </div>

    <div id="ar-container">
        <div id="loading-overlay">جاري تشغيل الكاميرا...</div>
        <div class="camera-frame">
            <a-scene mindar-face="uiLoading:no; uiScanning:no" embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
                <a-assets>
                    <a-asset-item id="glassesModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/glasses/scene.gltf"></a-asset-item>
                    <a-asset-item id="hatModel" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.0/examples/face-tracking/assets/hat/scene.gltf"></a-asset-item>
                </a-assets>
                <a-camera active="false" position="0 0 0"></a-camera>
                
                <a-entity id="glasses-ent" mindar-face-target="anchorIndex: 168" visible="false">
                    <a-gltf-model src="#glassesModel" rotation="0 0 0" position="0 0 0" scale="0.01 0.01 0.01"></a-gltf-model>
                </a-entity>
                
                <a-entity id="hat-ent" mindar-face-target="anchorIndex: 10" visible="false">
                    <a-gltf-model src="#hatModel" rotation="0 -90 0" position="0 -0.2 -0.5" scale="0.008 0.008 0.008"></a-gltf-model>
                </a-entity>
            </a-scene>
        </div>
    </div>

    <script>
        function switchProduct(type) {
            document.getElementById('glasses-ent').setAttribute('visible', type === 'glasses');
            document.getElementById('hat-ent').setAttribute('visible', type === 'hat');
        }

        document.addEventListener("DOMContentLoaded", () => {
            const sceneEl = document.querySelector('a-scene');
            sceneEl.addEventListener("ready", () => {
                document.getElementById('loading-overlay').style.display = 'none';
            });
        });
    </script>
</body>
</html>
